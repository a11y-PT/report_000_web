name: Setup labels

permissions:
  contents: write
  issues: write
  actions: write

on:
  push:
    branches:
      - main  # Ou a branch default do template
  repository_dispatch:  # Também podes disparar manualmente

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

# Step temporária para testar se o secret está acessível
      - name: Test secret
        run: echo "${{ secrets.LABELS_TOKEN }}"

      - name: Install GitHub Label Sync
        run: npm install -g github-label-sync

      - name: Apply labels
        run: |          
          github-label-sync --labels .github/labels/labels.yml --token ${{ secrets.LABELS_TOKEN }}

        env:
          GITHUB_TOKEN: ${{ secrets.LABELS_TOKEN }}
